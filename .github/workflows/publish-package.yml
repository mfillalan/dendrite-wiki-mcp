name: Publish to npm

# Manually triggered from the Actions tab so a human always presses "Run workflow"
# before a release lands on the public registry. Mirrors the dendrite-mcp predecessor's
# explicit-approval flow but simplified for a pure-TypeScript package (no native binaries
# to cross-build, no multi-runner matrix needed).
#
# Setup once (operator):
# 1. Generate a granular access token at https://www.npmjs.com/settings/<your-username>/tokens
#    - Permissions: "Read and write" + check "Bypass two-factor authentication"
#    - Packages: select dendrite-wiki-mcp (or '*' for any package you publish)
#    - Set a sensible expiration
# 2. Add the token as a repository secret named NPM_TOKEN at
#    https://github.com/<owner>/dendrite-wiki-mcp/settings/secrets/actions
# 3. Add two more repository secrets for the opt-in telemetry baked defaults
#    (Benchmark Telemetry Database Roadmap T4):
#    - DENDRITE_TELEMETRY_PUBLISH_URL: the HTTPS form of your Turso DB URL
#      (e.g. https://dendrite-wiki-telemetry-<org>.aws-<region>.turso.io —
#      NOT the libsql:// form the dashboard shows by default)
#    - DENDRITE_TELEMETRY_PUBLISH_TOKEN: a write-scoped token on that DB,
#      generated via the dashboard's Tokens page
#    These get injected into src/wiki/telemetry-defaults.ts by prepublishOnly
#    so opt-in users without env vars still reach the Dendrite-hosted destination.
#    See docs/wiki/benchmark-telemetry-database-roadmap.md for the full design.
# 4. Optional: add two more repository secrets for the public cohort dashboard
#    (Benchmark Telemetry Database Roadmap T13). When set, the published package
#    bakes a read-scoped token so anyone visiting /wiki/aggregate-learnings sees
#    live cohort data — the credibility surface is always current without manual
#    JSON commits. When omitted, the dashboard falls back to whatever JSON is
#    committed in docs/public/aggregate-learnings.json (still a valid surface,
#    just not live):
#    - DENDRITE_TELEMETRY_PUBLISH_REPORT_URL: same Turso DB URL as above
#    - DENDRITE_TELEMETRY_PUBLISH_REPORT_TOKEN: a READ-scoped token, generated
#      separately. Never reuse the write token here — they have to be distinct
#      so the SQL permission gate enforces the read-vs-write separation.
#
# To release:
# 1. Bump version in package.json + date-stamp the CHANGELOG section
# 2. Commit, push, tag (git push && git push --tags)
# 3. Open the Actions tab, select "Publish to npm", click "Run workflow"
# 4. Pick the dist-tag (alpha / beta / latest) and whether to dry-run first
# 5. (Recommended for first run after any workflow edit) dry_run=true to verify the
#    tarball contents render correctly in the Actions log without publishing
# 6. Re-run with dry_run=false to actually publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - latest
      dry_run:
        description: 'Dry run only (verify tarball, no publish)'
        required: true
        default: false
        type: boolean

jobs:
  publish:
    name: Publish package to npm registry
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js + npm registry auth
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          # setup-node writes a .npmrc that uses NODE_AUTH_TOKEN at publish time

      - name: Install dependencies
        run: npm ci

      - name: Show version + tag that will be published
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "::notice title=Publishing::dendrite-wiki-mcp@${VERSION} → tag '${{ inputs.tag }}' (dry_run=${{ inputs.dry_run }})"

      - name: Verify package contents (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish --tag ${{ inputs.tag }} --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # T4: prepublishOnly reads these and writes them into src/wiki/telemetry-defaults.ts
          # before the package is packed. The injection script refuses to run with bad values
          # (e.g. libsql:// URLs or missing token), so dry-run also exercises the bake-in path.
          DENDRITE_TELEMETRY_PUBLISH_URL: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_URL }}
          DENDRITE_TELEMETRY_PUBLISH_TOKEN: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_TOKEN }}
          # T13: optional read-scoped pair for the public cohort dashboard. When the
          # secrets are present, the published bundle includes them so the dashboard
          # reads live data on every page load. When absent, the secrets resolve to
          # empty strings and the dashboard falls back to the committed JSON.
          DENDRITE_TELEMETRY_PUBLISH_REPORT_URL: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_REPORT_URL }}
          DENDRITE_TELEMETRY_PUBLISH_REPORT_TOKEN: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_REPORT_TOKEN }}

      - name: Publish to npm registry
        if: ${{ !inputs.dry_run }}
        run: npm publish --tag ${{ inputs.tag }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DENDRITE_TELEMETRY_PUBLISH_URL: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_URL }}
          DENDRITE_TELEMETRY_PUBLISH_TOKEN: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_TOKEN }}
          DENDRITE_TELEMETRY_PUBLISH_REPORT_URL: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_REPORT_URL }}
          DENDRITE_TELEMETRY_PUBLISH_REPORT_TOKEN: ${{ secrets.DENDRITE_TELEMETRY_PUBLISH_REPORT_TOKEN }}

      - name: Verify published version on registry
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Sleep briefly to let the registry CDN catch up before we query.
          sleep 5
          PUBLISHED=$(npm view dendrite-wiki-mcp@${VERSION} version 2>/dev/null || echo "not-found")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::notice title=Published::dendrite-wiki-mcp@${VERSION} is live on https://registry.npmjs.org/"
          else
            echo "::warning title=Verification skipped::Could not confirm dendrite-wiki-mcp@${VERSION} on the registry yet (CDN propagation lag is normal). Check https://www.npmjs.com/package/dendrite-wiki-mcp manually."
          fi
